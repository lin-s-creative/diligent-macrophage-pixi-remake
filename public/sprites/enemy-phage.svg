<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -30 60 96" width="60" height="96">
  <!-- Enemy: Bacteriophage (virus with hexagonal head + tail + legs) -->

  <!-- Outer halo -->
  <circle cx="0" cy="-2" r="32" fill="#8b1e2e" opacity="0.18"/>

  <!-- Hexagonal capsid head -->
  <polygon points="0,-26 22,-13 22,9 0,22 -22,9 -22,-13"
    fill="#8b1e2e" stroke="#4d0710" stroke-width="4" stroke-opacity="0.95"/>

  <!-- Capsid plate facets -->
  <line x1="0" y1="-2" x2="0" y2="-26" stroke="#5c0f18" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="0" y1="-2" x2="22" y2="-13" stroke="#5c0f18" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="0" y1="-2" x2="22" y2="9" stroke="#5c0f18" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="0" y1="-2" x2="0" y2="22" stroke="#5c0f18" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="0" y1="-2" x2="-22" y2="9" stroke="#5c0f18" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="0" y1="-2" x2="-22" y2="-13" stroke="#5c0f18" stroke-width="1.5" stroke-opacity="0.8"/>

  <!-- Capsid highlight -->
  <ellipse cx="-6" cy="-14" rx="10" ry="4" fill="#ffd2c8" opacity="0.32"/>
  <ellipse cx="-9" cy="-16" rx="4" ry="1.5" fill="#ffffff" opacity="0.45"/>

  <!-- Tail sheath -->
  <rect x="-5" y="14" width="10" height="18" rx="2" ry="2"
    fill="#6b1520" stroke="#4d0710" stroke-width="2" stroke-opacity="0.85"/>
  <!-- Tail rings -->
  <line x1="-5" y1="17" x2="5" y2="17" stroke="#ff9b8b" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="-5" y1="21" x2="5" y2="21" stroke="#ff9b8b" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="-5" y1="25" x2="5" y2="25" stroke="#ff9b8b" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="-5" y1="29" x2="5" y2="29" stroke="#ff9b8b" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Base plate -->
  <rect x="-9" y="31" width="18" height="4" rx="1" ry="1"
    fill="#4d0710" stroke="#4d0710" stroke-width="2" stroke-opacity="0.9"/>

  <!-- Tail fibers (legs) -->
  <polyline points="-7,33 -16,38 -22,46" fill="none" stroke="#ff9b8b" stroke-width="2" stroke-opacity="0.7"/>
  <polyline points="-2,34 -6,42 -3,50" fill="none" stroke="#ff9b8b" stroke-width="2" stroke-opacity="0.7"/>
  <polyline points="2,34 6,42 3,50" fill="none" stroke="#ff9b8b" stroke-width="2" stroke-opacity="0.7"/>
  <polyline points="7,33 16,38 22,46" fill="none" stroke="#ff9b8b" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Nucleic acid coil inside capsid -->
  <path d="M-12,-2 C-6,-10 6,6 12,-2" fill="none" stroke="#ff5a5a" stroke-width="1.2" stroke-opacity="0.45"/>
  <path d="M-10,4 C-4,-2 4,10 10,4" fill="none" stroke="#ff5a5a" stroke-width="1.2" stroke-opacity="0.45"/>

  <!-- Center spike / core -->
  <circle cx="0" cy="-2" r="8" fill="#5c0f18" stroke="#39040c" stroke-width="2" stroke-opacity="0.85"/>
  <circle cx="-2" cy="-4" r="3" fill="#ff9b8b" opacity="0.3"/>
</svg>
