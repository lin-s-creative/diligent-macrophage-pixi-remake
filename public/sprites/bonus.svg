<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-32 -24 64 48" width="64" height="48">
  <!-- Bonus pickup container - generic capsule shape -->
  <!-- Outer edge -->
  <rect x="-28" y="-20" width="56" height="40" rx="16" ry="16"
    fill="#ffdc4d" fill-opacity="0.96" stroke="#b89a20" stroke-width="4" stroke-opacity="0.95"/>
  <!-- Inner glow line -->
  <rect x="-22" y="-14" width="44" height="28" rx="14" ry="14"
    fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.18"/>
  <!-- Center icon placeholder (star/cross) -->
  <line x1="-8" y1="0" x2="8" y2="0" stroke="#ffffff" stroke-width="3" stroke-opacity="0.7" stroke-linecap="round"/>
  <line x1="0" y1="-8" x2="0" y2="8" stroke="#ffffff" stroke-width="3" stroke-opacity="0.7" stroke-linecap="round"/>
</svg>
