<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-28 -28 56 56" width="56" height="56">
  <!-- Enemy: Coccus (spherical bacterium) -->
  <!-- Outer soft halo -->
  <ellipse cx="0" cy="0" rx="24" ry="23" fill="#66c653" opacity="0.18"/>

  <!-- Main body - irregular blob -->
  <path d="M16,-6 Q19,-1 18,4 Q15,10 11,13 Q6,17 0,18 Q-7,18 -12,14 Q-17,10 -18,4 Q-19,-3 -16,-8 Q-12,-14 -7,-16 Q-1,-18 6,-16 Q11,-14 15,-10 Z"
    fill="#66c653" stroke="#1a5c12" stroke-width="4" stroke-opacity="0.65"/>

  <!-- Bright inner edge -->
  <path d="M15,-5 Q18,-1 17,4 Q14,9 10,12 Q5,16 0,17 Q-6,17 -11,13 Q-16,9 -17,4 Q-18,-3 -15,-7 Q-11,-13 -6,-15 Q-1,-17 5,-15 Q10,-13 14,-9 Z"
    fill="none" stroke="#3da82e" stroke-width="1.8" stroke-opacity="0.95"/>

  <!-- Shadow crescent -->
  <ellipse cx="4" cy="5" rx="12" ry="10" fill="#1a3d10" opacity="0.32"/>

  <!-- Body overlay -->
  <ellipse cx="-1" cy="-1" rx="15" ry="14" fill="#66c653" opacity="0.55"/>

  <!-- Organelle granules -->
  <circle cx="8" cy="-5" r="1.3" fill="#b8f0a8" opacity="0.55"/>
  <circle cx="-4" cy="7" r="1.1" fill="#2d5c1a" opacity="0.55"/>
  <circle cx="5" cy="8" r="1.0" fill="#b8f0a8" opacity="0.55"/>
  <circle cx="-10" cy="-3" r="1.2" fill="#2d5c1a" opacity="0.55"/>
  <circle cx="0" cy="-10" r="1.0" fill="#b8f0a8" opacity="0.55"/>
  <circle cx="-7" cy="10" r="0.9" fill="#b8f0a8" opacity="0.55"/>
  <circle cx="11" cy="3" r="1.1" fill="#2d5c1a" opacity="0.55"/>
  <circle cx="-12" cy="5" r="1.0" fill="#b8f0a8" opacity="0.55"/>
  <circle cx="3" cy="-12" r="0.8" fill="#2d5c1a" opacity="0.55"/>

  <!-- Specular highlights -->
  <ellipse cx="-6" cy="-7" rx="7" ry="3.5" fill="#ffffff" opacity="0.22"/>
  <ellipse cx="-8" cy="-8" rx="3" ry="1.4" fill="#ffffff" opacity="0.45"/>

  <!-- Membrane ring -->
  <ellipse cx="0" cy="0" rx="15" ry="14" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.18"/>
</svg>
