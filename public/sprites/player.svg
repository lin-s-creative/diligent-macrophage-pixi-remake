<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -40 80 80" width="80" height="80">
  <!-- Player: Macrophage cell -->
  <!-- Outer soft halo -->
  <ellipse cx="0" cy="0" rx="34" ry="33" fill="#f5e1c8" opacity="0.18"/>

  <!-- Main body - irregular blob shape -->
  <path d="M24,-8 Q28,-2 26,6 Q22,14 16,18 Q8,24 0,26 Q-10,26 -18,20 Q-24,14 -26,6 Q-28,-4 -24,-12 Q-18,-20 -10,-24 Q-2,-26 8,-24 Q16,-20 22,-14 Z"
    fill="#f5e1c8" stroke="#6b4a3f" stroke-width="5" stroke-opacity="0.65"/>

  <!-- Bright inner edge -->
  <path d="M22,-7 Q26,-2 24,6 Q20,13 15,17 Q7,22 0,24 Q-9,24 -17,19 Q-22,13 -24,6 Q-26,-4 -22,-11 Q-17,-19 -9,-22 Q-2,-24 7,-22 Q15,-19 20,-13 Z"
    fill="none" stroke="#d2a89f" stroke-width="2" stroke-opacity="0.95"/>

  <!-- Shadow crescent lower-right -->
  <ellipse cx="6" cy="8" rx="17" ry="14" fill="#6b5a3a" opacity="0.32"/>

  <!-- Body overlay softens shadow -->
  <ellipse cx="-1" cy="-2" rx="22" ry="20" fill="#f5e1c8" opacity="0.55"/>

  <!-- Organelle granules -->
  <circle cx="12" cy="-8" r="1.8" fill="#faf0e0" opacity="0.55"/>
  <circle cx="-6" cy="10" r="1.5" fill="#8b6b50" opacity="0.55"/>
  <circle cx="8" cy="12" r="1.3" fill="#faf0e0" opacity="0.55"/>
  <circle cx="-14" cy="-4" r="1.6" fill="#8b6b50" opacity="0.55"/>
  <circle cx="0" cy="-14" r="1.4" fill="#faf0e0" opacity="0.55"/>
  <circle cx="-10" cy="14" r="1.2" fill="#faf0e0" opacity="0.55"/>
  <circle cx="16" cy="4" r="1.5" fill="#8b6b50" opacity="0.55"/>
  <circle cx="-18" cy="8" r="1.3" fill="#faf0e0" opacity="0.55"/>
  <circle cx="4" cy="-18" r="1.1" fill="#8b6b50" opacity="0.55"/>

  <!-- Specular highlights top-left -->
  <ellipse cx="-9" cy="-10" rx="10" ry="5" fill="#ffffff" opacity="0.22"/>
  <ellipse cx="-12" cy="-12" rx="4" ry="2" fill="#ffffff" opacity="0.45"/>

  <!-- Subtle membrane ring -->
  <ellipse cx="0" cy="0" rx="22" ry="20" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.18"/>
</svg>
