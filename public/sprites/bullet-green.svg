  <ellipse cx="0" cy="0" rx="18" ry="10" fill="#53e07a" opacity="0.25"/>

  <!-- Body shadow -->
  <polygon points="13,1 3,-7 3,-2 -13,-2 -13,4 3,4 3,9" fill="#2a7040" opacity="0.55"/>

  <!-- Body -->
