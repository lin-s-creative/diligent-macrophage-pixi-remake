<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -12 40 24" width="40" height="24">
  <!-- Bullet: Green arrow (weapon 4) - front/back charge -->
