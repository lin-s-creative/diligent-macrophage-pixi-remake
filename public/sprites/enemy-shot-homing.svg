<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-24 -24 48 48" width="48" height="48">
  <!-- Enemy homing shot - fiery arrow projectile -->
  <!-- Outer glow / target ring -->
  <circle cx="0" cy="0" r="18" fill="#ffa238" opacity="0.2"/>
  <circle cx="-4" cy="0" r="14" fill="none" stroke="#ff7c7c" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="-4" cy="0" r="17" fill="none" stroke="#fff0aa" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Trailing flames -->
  <line x1="-8" y1="-4" x2="-18" y2="-2" stroke="#ff7c00" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="-8" y1="4" x2="-18" y2="2" stroke="#ff7c00" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="-6" y1="0" x2="-22" y2="0" stroke="#ff7c00" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Body shadow -->
  <polygon points="17,1 -7,-10 -1,1 -7,12" fill="#994510" opacity="0.7"/>

  <!-- Body -->
  <polygon points="16,0 -8,-11 -2,0 -8,11" fill="#ffa238"/>

  <!-- Bright edge -->
  <polygon points="16,0 -8,-11 -2,0 -8,11" fill="none" stroke="#fff0aa" stroke-width="2" stroke-opacity="0.9"/>

  <!-- Tip spark -->
  <circle cx="13" cy="0" r="2" fill="#ffffff" opacity="0.95"/>
</svg>
