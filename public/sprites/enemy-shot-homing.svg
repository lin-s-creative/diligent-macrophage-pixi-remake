<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-24 -24 48 48" width="48" height="48">
  <!-- Enemy homing shot - flagellated bacterium -->
  <defs>
    <radialGradient id="homing-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#fff0aa" stop-opacity="0.32"/>
      <stop offset="58%" stop-color="#ffa238" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffa238" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cell-body" x1="-13" y1="-8" x2="15" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="52%" stop-color="#ff9f38"/>
      <stop offset="100%" stop-color="#e36b22"/>
    </linearGradient>
  </defs>

  <!-- Soft danger glow -->
  <circle cx="0" cy="0" r="22" fill="url(#homing-glow)"/>
  <ellipse cx="1" cy="0" rx="17" ry="12" fill="#ff7c7c" opacity="0.12"/>

  <!-- Flagellum bundle, trailing behind the cell -->
  <path d="M-11,-4 C-17,-11 -21,-6 -23,-13" fill="none" stroke="#fff0aa" stroke-width="2" stroke-linecap="round" stroke-opacity="0.82"/>
  <path d="M-12,0 C-18,-3 -20,4 -24,1" fill="none" stroke="#ffb45d" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.9"/>
  <path d="M-11,4 C-17,11 -21,6 -23,13" fill="none" stroke="#fff0aa" stroke-width="2" stroke-linecap="round" stroke-opacity="0.82"/>
  <path d="M-10,0 C-16,6 -15,13 -21,18" fill="none" stroke="#ff7c7c" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.55"/>

  <!-- Small surface pili -->
  <path d="M-2,-11 C-4,-16 -1,-17 -2,-21" fill="none" stroke="#ffcf86" stroke-width="1.4" stroke-linecap="round" stroke-opacity="0.62"/>
  <path d="M7,-10 C9,-15 13,-15 15,-19" fill="none" stroke="#ffcf86" stroke-width="1.4" stroke-linecap="round" stroke-opacity="0.62"/>
  <path d="M3,11 C4,16 8,17 9,21" fill="none" stroke="#ffcf86" stroke-width="1.4" stroke-linecap="round" stroke-opacity="0.62"/>

  <!-- Capsule-shaped bacterial body -->
  <rect x="-13" y="-10" width="29" height="20" rx="10" ry="10"
    fill="#8f3d14" opacity="0.8" transform="rotate(4)"/>
  <rect x="-15" y="-11" width="30" height="22" rx="11" ry="11"
    fill="url(#cell-body)" stroke="#8f3d14" stroke-width="3" transform="rotate(4)"/>
  <rect x="-10" y="-6" width="21" height="12" rx="6" ry="6"
    fill="#ffd47f" opacity="0.35" transform="rotate(4)"/>

  <!-- Internal granules -->
  <circle cx="-7" cy="-3" r="1.35" fill="#fff0aa" opacity="0.72"/>
  <circle cx="-2" cy="3" r="1.2" fill="#9b4212" opacity="0.5"/>
  <circle cx="4" cy="-2" r="1.3" fill="#fff0aa" opacity="0.66"/>
  <circle cx="8" cy="4" r="1.1" fill="#9b4212" opacity="0.48"/>
  <circle cx="11" cy="-4" r="0.95" fill="#fff0aa" opacity="0.6"/>

  <!-- Highlights and membrane details -->
  <path d="M-8,-7 Q0,-11 10,-6" fill="none" stroke="#fff7cf" stroke-width="2" stroke-linecap="round" stroke-opacity="0.42"/>
  <path d="M-8,7 Q0,11 10,6" fill="none" stroke="#b64f16" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.42"/>
  <ellipse cx="-4" cy="-6" rx="5" ry="2" fill="#ffffff" opacity="0.28" transform="rotate(-12 -4 -6)"/>

  <!-- Forward cap spark without arrow silhouette -->
  <circle cx="14" cy="0" r="2.4" fill="#fff0aa" opacity="0.78"/>
</svg>
