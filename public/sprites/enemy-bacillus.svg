<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-80 -22 160 44" width="160" height="44">
  <!-- Enemy: Bacillus (rod-shaped bacterium with flagella) -->

  <!-- Trailing flagella -->
  <path d="M-38,-3 C-50,-10 -58,-2 -68,-8" fill="none" stroke="#c8a8ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <path d="M-38,3 C-52,8 -60,1 -72,5" fill="none" stroke="#c8a8ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <path d="M-36,0 C-46,2 -56,-3 -64,0" fill="none" stroke="#c8a8ff" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Outer cell wall halo -->
  <rect x="-42" y="-18" width="84" height="36" rx="18" ry="18"
    fill="#a86ee0" fill-opacity="0.18" stroke="#a86ee0" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Main body -->
  <rect x="-38" y="-15" width="76" height="30" rx="15" ry="15"
    fill="#8c4dd3" stroke="#4d1f7b" stroke-width="4" stroke-opacity="0.95"/>

  <!-- Inner cytoplasm tint -->
  <rect x="-32" y="-10" width="64" height="20" rx="10" ry="10"
    fill="#a86ee0" fill-opacity="0.45"/>

  <!-- Polar caps -->
  <circle cx="-30" cy="0" r="6" fill="#4d2870" opacity="0.55"/>
  <circle cx="30" cy="0" r="6" fill="#4d2870" opacity="0.55"/>

  <!-- Ribosomes -->
  <circle cx="-26" cy="-2" r="1.4" fill="#d0b1ff" opacity="0.6"/>
  <circle cx="-20" cy="2" r="1.4" fill="#d0b1ff" opacity="0.6"/>
  <circle cx="-14" cy="-4" r="1.4" fill="#d0b1ff" opacity="0.6"/>
  <circle cx="-8" cy="1" r="1.4" fill="#d0b1ff" opacity="0.6"/>
  <circle cx="-2" cy="-3" r="1.4" fill="#d0b1ff" opacity="0.6"/>
  <circle cx="4" cy="3" r="1.4" fill="#d0b1ff" opacity="0.6"/>
  <circle cx="10" cy="-1" r="1.4" fill="#d0b1ff" opacity="0.6"/>
  <circle cx="16" cy="4" r="1.4" fill="#d0b1ff" opacity="0.6"/>
  <circle cx="22" cy="-2" r="1.4" fill="#d0b1ff" opacity="0.6"/>
  <circle cx="28" cy="0" r="1.4" fill="#d0b1ff" opacity="0.6"/>

  <!-- Specular highlight band -->
  <ellipse cx="-12" cy="-7" rx="24" ry="5" fill="#ffffff" opacity="0.18"/>
  <ellipse cx="-18" cy="-9" rx="8" ry="2" fill="#ffffff" opacity="0.32"/>

  <!-- Surface ridges -->
  <path d="M-29,-10 Q-10,-17 7,-10" fill="none" stroke="#d0b1ff" stroke-width="2" stroke-opacity="0.55"/>
  <path d="M-22,11 Q2,17 27,8" fill="none" stroke="#d0b1ff" stroke-width="2" stroke-opacity="0.55"/>
  <path d="M-15,-4 Q0,-7 18,-3" fill="none" stroke="#d0b1ff" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Septum ring (division marker) -->
  <line x1="0" y1="-15" x2="0" y2="15" stroke="#4d2870" stroke-width="2" stroke-opacity="0.6"/>
</svg>
